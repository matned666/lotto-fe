<main class="auth-page">
   <section class="auth-layout">
    <div class="auth-copy">
      <p class="eyebrow">Llama</p>
      <h1>{{ 'START.WELCOME' | translate }}</h1>
      <p class="lead">{{ 'START.LOG_IN_AND_START' | translate }}</p>

      <button class="primary-action" type="button" (click)="loginByGithub()">
        <i class="fa-brands fa-github"></i>
        <span>{{ 'START.LOG_IN_WITH_GITHUB' | translate }}</span>
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M13.25 5.25 19.5 11.5l-6.25 6.25-1.4-1.4 3.85-3.85H4.5v-2h11.2l-3.85-3.85 1.4-1.4Z" />
        </svg>
      </button>

      <button class="primary-action" type="button" (click)="loginByGoogle()">
        <i class="fa-brands fa-google"></i>
        <span>{{ 'START.LOG_IN_WITH_GOOGLE' | translate }}</span>
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M13.25 5.25 19.5 11.5l-6.25 6.25-1.4-1.4 3.85-3.85H4.5v-2h11.2l-3.85-3.85 1.4-1.4Z" />
        </svg>
      </button>

      @if (errorMessage()) {
        <p class="error-message">{{ errorMessage() | translate}}</p>
      }
    </div>

    <figure class="llama-visual">
      <img ngSrc="/assets/llama-sunshine.png" alt="Llama" height="1536" width="1024"/>
    </figure>
  </section>
</main>
